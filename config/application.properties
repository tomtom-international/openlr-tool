# OpenLR WebTool - PostgreSQL Configuration
application.title=OpenLR WebTool - PostgreSQL
application.version=v0.1.0
server.max-http-header-size=256KB

# Server port
server.port=8081

# Logging configuration
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.jdbc=DEBUG
logging.level.org.hibernate=DEBUG
logging.level.com.tomtom.openlr.webtool=DEBUG
logging.level.openlr=DEBUG

#---------------------------------------------------------#
# PostgreSQL MapDatabase - Generic OpenLR Schema         #
#---------------------------------------------------------#
spring.profiles.active=generic_pg_mapdb

# Database connection settings
# For Docker: use service name 'postgres' as hostname
# For local development: use 'localhost'
spring.datasource.url=jdbc:postgresql://postgres:5432/openlr_db
spring.datasource.username=openlr
spring.datasource.password=openlrpwd
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP connection pool settings
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# OpenLR configuration paths (container paths)
decoder_properties_dir=/app/config/decoding_properties
encoding_properties_dir=/app/config/encoding_properties

# Database schema and table names
db_schema=local
roads_table=roads
intersections_table=intersections

# Cache settings
cache_size=1000000
